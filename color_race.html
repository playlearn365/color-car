<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>顏色卡片賽車遊戲</title>
  <style>
    body {
      text-align: center;
      background: #f0f0f0;
      font-family: Arial;
      margin: 0;
      padding: 0;
    }
    canvas {
      background: #ddd;
      border: 2px solid #333;
      margin-top: 10px;
    }
    #controls {
      margin-top: 10px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin: 5px;
    }
    .colorBox {
      display: inline-block;
      width: 20px;
      height: 20px;
      vertical-align: middle;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>顏色卡片賽車遊戲</h1>
  <p>目標顏色：<span class="colorBox" id="colorBox"></span> <span id="targetColor">red</span></p>
  <p>分數：<span id="score">0</span>，錯誤：<span id="mistakes">0</span> / 3</p>
  <canvas id="gameCanvas" width="400" height="500"></canvas>
  <div id="controls">
    <button id="leftBtn">← 左</button>
    <button id="rightBtn">右 →</button>
    <button id="restartBtn" style="display:none;">重新開始</button>
  </div>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const targetColorDisplay = document.getElementById("targetColor");
    const colorBox = document.getElementById("colorBox");
    const scoreDisplay = document.getElementById("score");
    const mistakesDisplay = document.getElementById("mistakes");
    const restartBtn = document.getElementById("restartBtn");

    const colors = [
      { color: "red", name: "red" },
      { color: "green", name: "green" },
      { color: "yellow", name: "yellow" }
    ];

    const successSound = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_6f9d1f2898.mp3");

    let currentTarget = colors[Math.floor(Math.random() * colors.length)];
    colorBox.style.background = currentTarget.color;
    targetColorDisplay.textContent = currentTarget.name;

    const car = {
      lane: 1,
      y: canvas.height - 80,
      width: 40,
      height: 60
    };

    let colorCard = {
      lane: Math.floor(Math.random() * 3),
      color: colors[Math.floor(Math.random() * colors.length)].color,
      y: -40,
      speed: 3
    };

    let score = 0;
    let mistakes = 0;
    let showX = false;
    let showXTimer = 0;
    let gameOver = false;

    function resetColorCard() {
      colorCard = {
        lane: Math.floor(Math.random() * 3),
        color: colors[Math.floor(Math.random() * colors.length)].color,
        y: -40,
        speed: 3
      };
    }

    function drawLanes() {
      for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(i * (canvas.width/3), 0);
        ctx.lineTo(i * (canvas.width/3), canvas.height);
        ctx.strokeStyle = "black";
        ctx.stroke();
      }
    }

    function drawCar() {
      const x = car.lane * (canvas.width/3) + (canvas.width/3)/2 - car.width/2;
      ctx.fillStyle = "blue";
      ctx.fillRect(x, car.y, car.width, car.height);
      if (showX) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("X", x + 10, car.y + 40);
      }
    }

    function drawColorCard() {
      const x = colorCard.lane * (canvas.width/3) + (canvas.width/3)/2 - 20;
      ctx.fillStyle = colorCard.color;
      ctx.fillRect(x, colorCard.y, 40, 40);
    }

    function checkCollision() {
      if (
        car.lane === colorCard.lane &&
        colorCard.y + 40 >= car.y &&
        colorCard.y <= car.y + car.height
      ) {
        if (colorCard.color === currentTarget.color) {
          successSound.play();
          score++;
          scoreDisplay.textContent = score;
        } else {
          mistakes++;
          mistakesDisplay.textContent = mistakes;
          showX = true;
          showXTimer = 30; // 30 frame
        }
        nextRound();
      }
    }

    function nextRound() {
      currentTarget = colors[Math.floor(Math.random() * colors.length)];
      colorBox.style.background = currentTarget.color;
      targetColorDisplay.textContent = currentTarget.name;
      resetColorCard();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawLanes();
      drawColorCard();
      drawCar();
      if (!gameOver) checkCollision();
    }

    function update() {
      if (!gameOver) {
        colorCard.y += colorCard.speed;
        if (colorCard.y > canvas.height) {
          nextRound();
        }
        if (showX) {
          showXTimer--;
          if (showXTimer <= 0) {
            showX = false;
          }
        }
        if (mistakes >= 3 || score >= 10) {
          gameOver = true;
          alert(`遊戲結束！分數：${score}`);
          restartBtn.style.display = "inline-block";
        }
      }
    }

    function gameLoop() {
      draw();
      update();
      requestAnimationFrame(gameLoop);
    }

    // 觸控
    document.getElementById("leftBtn").addEventListener("touchstart", () => {
      if (car.lane > 0 && !gameOver) car.lane--;
    });
    document.getElementById("rightBtn").addEventListener("touchstart", () => {
      if (car.lane < 2 && !gameOver) car.lane++;
    });

    // 鍵盤
    document.addEventListener("keydown", e => {
      if (gameOver) return;
      if (e.key === "ArrowLeft" && car.lane > 0) car.lane--;
      if (e.key === "ArrowRight" && car.lane < 2) car.lane++;
    });

    restartBtn.addEventListener("click", () => {
      // 重置遊戲
      score = 0;
      mistakes = 0;
      scoreDisplay.textContent = score;
      mistakesDisplay.textContent = mistakes;
      gameOver = false;
      restartBtn.style.display = "none";
      nextRound();
    });

    gameLoop();
  </script>
</body>
</html>
