<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>顏色賽車</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #FF3B30; --green: #34C759; --yellow: #FFD60A;
      --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
      --text: #eaeaea; --accent: #e94560;
    }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Nunito', sans-serif;
      touch-action: none; user-select: none;
    }
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 430px;
      margin: 0 auto; position: relative;
    }
    /* HUD */
    #hud {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 18px 8px;
      background: var(--surface);
      border-bottom: 2px solid #ffffff10;
      flex-shrink: 0;
    }
    #hud .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    #hud .label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: .5; }
    #hud .value { font-size: 26px; font-weight: 900; line-height: 1; }
    #mistakesDisplay { display: flex; gap: 5px; }
    .heart { font-size: 22px; transition: transform .2s; }
    .heart.lost { filter: grayscale(1); opacity: .3; }
    /* Target bar */
    #targetBar {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 10px 18px;
      background: var(--card); flex-shrink: 0;
      border-bottom: 2px solid #ffffff10;
    }
    #targetBar .label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; opacity: .55; }
    #colorSwatch {
      width: 32px; height: 32px; border-radius: 8px;
      border: 3px solid #ffffff40;
      transition: background .3s, transform .2s; flex-shrink: 0;
    }
    #colorSwatch.pulse { animation: swatchPulse .35s ease; }
    @keyframes swatchPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    #targetName { font-size: 20px; font-weight: 900; min-width: 70px; text-align: left; }
    /* Canvas */
    #canvasWrap { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
    /* Arrows */
    #arrows {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; pointer-events: none; height: 56px;
      justify-content: space-between; padding: 0 24px; align-items: center;
    }
    .arrow-hint { font-size: 28px; opacity: .15; }
    /* Overlay */
    #overlay {
      position: absolute; inset: 0; background: #0009;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; backdrop-filter: blur(6px); z-index: 10;
    }
    #overlay h2 { font-size: 36px; font-weight: 900; text-align: center; line-height: 1.1; }
    #overlay .big-score { font-size: 72px; font-weight: 900; color: var(--yellow); line-height: 1; }
    #overlay .sub { font-size: 15px; opacity: .6; text-align: center; line-height: 1.6; }
    /* How-to-play panel */
    #howto {
      background: #ffffff0f; border: 1px solid #ffffff18;
      border-radius: 16px; padding: 14px 20px;
      display: flex; flex-direction: column; gap: 8px;
      max-width: 280px;
    }
    #howto .row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    #howto .icon { font-size: 20px; width: 28px; text-align: center; }
    #playBtn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 16px; font-family: 'Nunito', sans-serif;
      font-size: 20px; font-weight: 900; padding: 16px 48px;
      cursor: pointer; letter-spacing: .5px;
      box-shadow: 0 4px 24px #e9456066;
      transition: transform .15s, box-shadow .15s;
    }
    #playBtn:active { transform: scale(.95); box-shadow: none; }
    /* Toast */
    #toast {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.8);
      font-size: 52px; font-weight: 900;
      opacity: 0; pointer-events: none; z-index: 9;
    }
    #toast.show { animation: toastAnim .5s ease forwards; }
    @keyframes toastAnim {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      70%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-100%) scale(1); }
    }
    /* Combo */
    #combo {
      position: absolute; top: 12px; right: 14px;
      font-size: 13px; font-weight: 900;
      background: var(--yellow); color: #1a1a2e;
      padding: 4px 10px; border-radius: 999px;
      opacity: 0; transition: opacity .3s; z-index: 8;
    }
    #combo.visible { opacity: 1; }
    /* Speed indicator */
    #speedBar {
      position: absolute; top: 12px; left: 14px;
      font-size: 12px; font-weight: 700;
      color: #ffffff60; z-index: 8;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat">
      <div class="label">分數</div>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="stat">
      <div class="label">目標</div>
      <div class="value" id="hudTarget" style="font-size:16px">—</div>
    </div>
    <div class="stat">
      <div class="label">命</div>
      <div id="mistakesDisplay">
        <span class="heart" id="h0">❤️</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
      </div>
    </div>
  </div>

  <div id="targetBar">
    <div class="label">撞這個顏色 →</div>
    <div id="colorSwatch"></div>
    <div id="targetName"></div>
  </div>

  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="arrows">
      <span class="arrow-hint">◀</span>
      <span class="arrow-hint">▶</span>
    </div>
    <div id="toast"></div>
    <div id="combo"></div>
    <div id="speedBar"></div>

    <div id="overlay">
      <h2 id="overlayTitle">顏色<br>賽車</h2>
      <div class="big-score" id="finalScore" style="display:none"></div>

      <div id="howto">
        <div class="row"><span class="icon">🎯</span><span>上方顯示目標顏色</span></div>
        <div class="row"><span class="icon">👆</span><span>滑動左右移動車子</span></div>
        <div class="row"><span class="icon">✅</span><span>撞上<b>同色卡片</b>得分</span></div>
        <div class="row"><span class="icon">❌</span><span>撞錯顏色或漏掉 -1 命</span></div>
        <div class="row"><span class="icon">🏆</span><span>得 <b>15 分</b>過關！</span></div>
      </div>

      <div class="sub" id="overlayMsg"></div>
      <button id="playBtn">開始遊戲</button>
    </div>
  </div>
</div>

<script>
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvasWrap');

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Colors ──
const COLORS = [
  { id: 'red',    hex: '#FF3B30', name: '紅色' },
  { id: 'green',  hex: '#34C759', name: '綠色' },
  { id: 'yellow', hex: '#FFD60A', name: '黃色' },
];

// ── State ──
let score, mistakes, combo, gameRunning, animId;
let car, cards, particles, roadOffset;
let target, framesSinceSpawn;

// ── UI refs ──
const scoreEl      = document.getElementById('scoreDisplay');
const heartsEl     = [document.getElementById('h0'), document.getElementById('h1'), document.getElementById('h2')];
const swatchEl     = document.getElementById('colorSwatch');
const nameEl       = document.getElementById('targetName');
const hudTargetEl  = document.getElementById('hudTarget');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const finalScoreEl = document.getElementById('finalScore');
const overlayMsg   = document.getElementById('overlayMsg');
const howtoEl      = document.getElementById('howto');
const playBtn      = document.getElementById('playBtn');
const toastEl      = document.getElementById('toast');
const comboEl      = document.getElementById('combo');
const speedBarEl   = document.getElementById('speedBar');

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Init ──
function initGame() {
  score = 0; mistakes = 0; combo = 0;
  cards = []; particles = []; roadOffset = 0;
  framesSinceSpawn = 0;

  car = { lane: 1, targetLane: 1 };
  target = rand(COLORS);
  updateTargetUI();
  updateHUD();
  spawnCard();

  gameRunning = true;
  overlay.style.display = 'none';
  cancelAnimationFrame(animId);
  loop();
}

function updateTargetUI() {
  swatchEl.style.background = target.hex;
  nameEl.textContent = target.name;
  nameEl.style.color = target.hex;
  hudTargetEl.textContent = target.name;
  hudTargetEl.style.color = target.hex;
  swatchEl.classList.remove('pulse');
  void swatchEl.offsetWidth;
  swatchEl.classList.add('pulse');
}

function updateHUD() {
  scoreEl.textContent = score;
  heartsEl.forEach((h, i) => h.classList.toggle('lost', i >= (3 - mistakes)));
}

// ── Spawn ──
function spawnCard() {
  // Ensure at least one card matches target color occasionally
  const forceMatch = Math.random() < 0.45;
  const color = forceMatch ? target : rand(COLORS);
  const lane  = Math.floor(Math.random() * 3);
  const speed = 2 + score * 0.08;
  cards.push({ lane, color, y: -70, speed });
  framesSinceSpawn = 0;
}

// ── Particles ──
function spawnParticles(x, y, color, count = 16) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * .5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: .035 + Math.random() * .02,
      r: 4 + Math.random() * 4,
      color,
    });
  }
}

// ── Draw car (top-down cute) ──
function drawCar(carX, carY, carW, carH) {
  const bw = carW, bh = carH;
  const bx = carX - bw / 2, by = carY;

  ctx.save();

  // shadow
  ctx.fillStyle = '#00000050';
  ctx.beginPath();
  ctx.ellipse(carX, by + bh/2 + 8, bw * .45, bh * .14, 0, 0, Math.PI*2);
  ctx.fill();

  // wheels
  const ww = bw * .22, wh = bh * .22, wr = 4;
  const wheelColor = '#1a1a1a';
  const positions = [
    [bx - ww + 3, by + bh * .08],
    [bx + bw - 3,  by + bh * .08],
    [bx - ww + 3, by + bh * .70],
    [bx + bw - 3,  by + bh * .70],
  ];
  positions.forEach(([wx, wy]) => {
    ctx.fillStyle = wheelColor;
    ctx.beginPath(); ctx.roundRect(wx, wy, ww, wh, wr); ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.roundRect(wx + 2, wy + 2, ww - 4, wh - 4, 3); ctx.fill();
  });

  // body
  ctx.fillStyle = '#FF3B30';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.fill();

  // side stripe (clipped to body)
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 14); ctx.clip();
  ctx.fillStyle = '#CC1A10';
  ctx.fillRect(bx, by + bh * .42, bw, bh * .16);
  ctx.restore();

  // windshield front
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#A8D8FF';
  ctx.beginPath(); ctx.roundRect(bx + bw*.12, by + bh*.07, bw*.76, bh*.26, 8); ctx.fill();
  ctx.globalAlpha = 1;

  // windshield shine
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath();
  ctx.ellipse(bx + bw*.30, by + bh*.14, bw*.14, bh*.07, -0.3, 0, Math.PI*2);
  ctx.fill();

  // rear window
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#A8D8FF';
  ctx.beginPath(); ctx.roundRect(bx + bw*.16, by + bh*.68, bw*.68, bh*.20, 7); ctx.fill();
  ctx.globalAlpha = 1;

  // roof center
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#BB1A10';
  ctx.beginPath(); ctx.roundRect(bx + bw*.14, by + bh*.34, bw*.72, bh*.32, 6); ctx.fill();
  ctx.globalAlpha = 1;

  // headlights
  ctx.fillStyle = '#FFFAAA';
  ctx.shadowColor = '#FFEE88'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(bx + bw*.22, by + bh*.10, bw*.09, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw*.78, by + bh*.10, bw*.09, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // tail lights
  ctx.fillStyle = '#FF2200';
  ctx.shadowColor = '#FF2200'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(bx + bw*.22, by + bh*.90, bw*.08, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw*.78, by + bh*.90, bw*.08, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // eyes - left
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw*.30, by + bh*.20, bw*.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1aee';
  ctx.beginPath(); ctx.arc(bx + bw*.30, by + bh*.21, bw*.08, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(bx + bw*.30, by + bh*.21, bw*.045, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw*.27, by + bh*.185, bw*.025, 0, Math.PI*2); ctx.fill();

  // eyes - right
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw*.70, by + bh*.20, bw*.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1aee';
  ctx.beginPath(); ctx.arc(bx + bw*.70, by + bh*.21, bw*.08, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(bx + bw*.70, by + bh*.21, bw*.045, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw*.67, by + bh*.185, bw*.025, 0, Math.PI*2); ctx.fill();

  // smile
  ctx.strokeStyle = '#CC1A10'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(carX, by + bh*.285, bw*.18, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // blush
  ctx.globalAlpha = 0.3; ctx.fillStyle = '#FF8888';
  ctx.beginPath(); ctx.ellipse(bx + bw*.18, by + bh*.275, bw*.10, bh*.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + bw*.82, by + bh*.275, bw*.10, bh*.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ── Main loop ──
function loop() {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);

  const W = canvas.width, H = canvas.height;
  const laneW = W / 3;
  const carW  = laneW * .45;
  const carH  = carW * 1.5;
  const carX  = car.lane * laneW + laneW / 2;
  const carY  = H - carH - 24;

  // background
  ctx.fillStyle = '#1e1e35';
  ctx.fillRect(0, 0, W, H);

  // road
  ctx.fillStyle = '#252540';
  ctx.fillRect(0, 0, W, H);

  // scrolling dashes
  roadOffset = (roadOffset + 4) % 80;
  ctx.strokeStyle = '#ffffff18'; ctx.lineWidth = 3;
  ctx.setLineDash([40, 40]); ctx.lineDashOffset = -roadOffset;
  for (let l = 1; l < 3; l++) {
    ctx.beginPath(); ctx.moveTo(l * laneW, 0); ctx.lineTo(l * laneW, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // edge lines
  ctx.strokeStyle = '#ffffff30'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-2, 0); ctx.lineTo(W-2, H); ctx.stroke();

  // ── Spawn logic ──
  framesSinceSpawn++;
  const maxCards = score < 5 ? 2 : 3;
  const spawnGap = Math.max(55, 100 - score * 2);
  if (cards.length < maxCards && framesSinceSpawn > spawnGap) {
    spawnCard();
  }

  // ── Draw cards ──
  cards.forEach(card => {
    card.y += card.speed;
    const cx = card.lane * laneW + laneW / 2;
    const cw = laneW * .58, ch = cw;

    // shadow
    ctx.fillStyle = '#00000040';
    ctx.beginPath(); ctx.roundRect(cx - cw/2 + 5, card.y + 5, cw, ch, 14); ctx.fill();

    // card body
    ctx.fillStyle = card.color.hex;
    ctx.beginPath(); ctx.roundRect(cx - cw/2, card.y, cw, ch, 14); ctx.fill();

    // shine overlay
    const g = ctx.createLinearGradient(cx - cw/2, card.y, cx, card.y + ch/2);
    g.addColorStop(0, '#ffffff35'); g.addColorStop(1, '#ffffff00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(cx - cw/2, card.y, cw, ch, 14); ctx.fill();

    // color name label on card
    ctx.fillStyle = '#00000060';
    ctx.font = `bold ${cw * .22}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(card.color.name, cx, card.y + ch / 2);
  });

  // ── Draw car ──
  drawCar(carX, carY, carW, carH);

  // ── Collision detection ──
  cards = cards.filter(card => {
    const cx = card.lane * laneW + laneW / 2;
    const cw = laneW * .58, ch = cw;

    // fell off screen — if it was the target color, penalise
    if (card.y > H + 10) {
      if (card.color.id === target.id) {
        mistakes++;
        combo = 0;
        updateHUD(); updateCombo();
        showToast('💨', cx, H * .5);
        checkGameOver();
        if (gameRunning) { nextTarget(); spawnCard(); }
      }
      return false;
    }

    // same lane collision
    if (card.lane === car.lane) {
      const cardBottom = card.y + ch;
      if (cardBottom >= carY && card.y <= carY + carH) {
        const hitX = cx, hitY = card.y + ch / 2;
        if (card.color.id === target.id) {
          combo++;
          score += combo > 2 ? 2 : 1;
          updateHUD(); updateCombo();
          spawnParticles(hitX, hitY, card.color.hex, 22);
          showToast('✓', hitX, hitY);
          if (score >= 15) { endGame(true); return false; }
        } else {
          mistakes++;
          combo = 0;
          updateHUD(); updateCombo();
          spawnParticles(hitX, hitY, '#FF3B30', 14);
          showToast('✗', hitX, hitY);
          checkGameOver();
        }
        if (gameRunning) { nextTarget(); spawnCard(); }
        return false;
      }
    }
    return true;
  });

  // ── Particles ──
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += .15;
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  // Speed indicator
  speedBarEl.textContent = `⚡ Lv.${Math.min(score+1,15)}`;
}

function nextTarget() {
  target = rand(COLORS);
  updateTargetUI();
}

function checkGameOver() {
  if (mistakes >= 3) endGame(false);
}

function endGame(win) {
  gameRunning = false;
  overlay.style.display = 'flex';
  howtoEl.style.display = 'none';
  overlayTitle.textContent = win ? '🎉 過關！' : '遊戲結束';
  finalScoreEl.style.display = 'block';
  finalScoreEl.textContent = score;
  overlayMsg.textContent = win ? '完美通關！你太厲害了！' : `差一點點，再試一次！`;
  playBtn.textContent = '再玩一次';
}

// ── Toast ──
let toastTimeout;
function showToast(text, x, y) {
  clearTimeout(toastTimeout);
  toastEl.textContent = text;
  toastEl.style.left = x + 'px';
  toastEl.style.top  = y + 'px';
  toastEl.classList.remove('show');
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 600);
}

// ── Combo ──
function updateCombo() {
  if (combo >= 2) {
    comboEl.textContent = `🔥 x${combo} 連擊`;
    comboEl.classList.add('visible');
  } else {
    comboEl.classList.remove('visible');
  }
}

// ── Touch input ──
let touchStartX = 0, touchMoved = false;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchMoved = false;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning) return;
  const dx = e.touches[0].clientX - touchStartX;
  if (Math.abs(dx) > 22) {
    touchMoved = true;
    if (dx > 0 && car.lane < 2) { car.lane++; touchStartX = e.touches[0].clientX; }
    if (dx < 0 && car.lane > 0) { car.lane--; touchStartX = e.touches[0].clientX; }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameRunning || touchMoved) return;
  const rect = canvas.getBoundingClientRect();
  const tx = e.changedTouches[0].clientX - rect.left;
  car.lane = Math.min(2, Math.floor(tx / (canvas.width / 3)));
}, { passive: false });

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if ((e.key === 'ArrowLeft'  || e.key === 'a') && car.lane > 0) car.lane--;
  if ((e.key === 'ArrowRight' || e.key === 'd') && car.lane < 2) car.lane++;
});

// ── Start ──
playBtn.addEventListener('click', initGame);

// ── Polyfill roundRect ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = typeof r === 'number' ? [r,r,r,r] : r;
    this.moveTo(x + rad[0], y);
    this.lineTo(x + w - rad[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad[1]);
    this.lineTo(x + w, y + h - rad[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - rad[2], y + h);
    this.lineTo(x + rad[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad[3]);
    this.lineTo(x, y + rad[0]);
    this.quadraticCurveTo(x, y, x + rad[0], y);
    this.closePath();
    return this;
  };
}
</script>
