<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>顏色賽車</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #FF3B30;
      --green: #34C759;
      --yellow: #FFD60A;
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --text: #eaeaea;
      --accent: #e94560;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      touch-action: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px 8px;
      background: var(--surface);
      border-bottom: 2px solid #ffffff10;
      flex-shrink: 0;
    }

    #hud .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    #hud .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: .5;
    }

    #hud .value {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }

    #mistakesDisplay {
      display: flex;
      gap: 5px;
    }

    .heart {
      font-size: 22px;
      transition: transform .2s;
    }
    .heart.lost { filter: grayscale(1); opacity: .3; }

    /* ── Target bar ── */
    #targetBar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 18px;
      background: var(--card);
      flex-shrink: 0;
      border-bottom: 2px solid #ffffff10;
    }

    #targetBar .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: .55;
    }

    #colorSwatch {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 3px solid #ffffff40;
      transition: background .3s, transform .2s;
      flex-shrink: 0;
    }
    #colorSwatch.pulse {
      animation: swatchPulse .35s ease;
    }
    @keyframes swatchPulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    #targetName {
      font-size: 20px;
      font-weight: 900;
      min-width: 70px;
      text-align: left;
    }

    /* ── Canvas wrapper ── */
    #canvasWrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Swipe arrows ── */
    #arrows {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      display: flex;
      pointer-events: none;
      height: 56px;
      justify-content: space-between;
      padding: 0 24px;
      align-items: center;
    }

    .arrow-hint {
      font-size: 28px;
      opacity: .15;
    }

    /* ── Overlay (game over / start) ── */
    #overlay {
      position: absolute;
      inset: 0;
      background: #0008;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #overlay h2 {
      font-size: 36px;
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
    }

    #overlay .big-score {
      font-size: 72px;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }

    #overlay .sub {
      font-size: 15px;
      opacity: .6;
    }

    #playBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 900;
      padding: 16px 48px;
      cursor: pointer;
      letter-spacing: .5px;
      box-shadow: 0 4px 24px #e9456066;
      transition: transform .15s, box-shadow .15s;
    }

    #playBtn:active { transform: scale(.95); box-shadow: none; }

    /* ── Feedback toast ── */
    #toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.8);
      font-size: 52px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: none;
    }
    #toast.show {
      animation: toastAnim .5s ease forwards;
    }
    @keyframes toastAnim {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      70%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-100%) scale(1); }
    }

    /* ── Combo badge ── */
    #combo {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 13px;
      font-weight: 900;
      background: var(--yellow);
      color: #1a1a2e;
      padding: 4px 10px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .3s;
      z-index: 8;
    }
    #combo.visible { opacity: 1; }
  </style>
</head>
<body>
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div class="stat">
      <div class="label">分數</div>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="stat">
      <div class="label">命</div>
      <div id="mistakesDisplay">
        <span class="heart" id="h0">❤️</span>
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
      </div>
    </div>
  </div>

  <!-- Target -->
  <div id="targetBar">
    <div class="label">目標</div>
    <div id="colorSwatch"></div>
    <div id="targetName"></div>
  </div>

  <!-- Game canvas -->
  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div id="arrows">
      <span class="arrow-hint">◀</span>
      <span class="arrow-hint">▶</span>
    </div>
    <div id="toast"></div>
    <div id="combo"></div>

    <!-- Overlay -->
    <div id="overlay">
      <h2>顏色<br>賽車</h2>
      <div class="big-score" id="finalScore" style="display:none"></div>
      <div class="sub" id="overlayMsg">滑動或點擊車道<br>撞對顏色的卡片！</div>
      <button id="playBtn">開始遊戲</button>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// ── Resize canvas to fill wrapper ──
function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Color definitions ──
const COLORS = [
  { id: 'red',    hex: '#FF3B30', name: '紅色' },
  { id: 'green',  hex: '#34C759', name: '綠色' },
  { id: 'yellow', hex: '#FFD60A', name: '黃色' },
];

// ── State ──
let score, mistakes, combo, gameRunning, animId;
let car, cards, particles, roadOffset;
let target;

// ── UI refs ──
const scoreEl    = document.getElementById('scoreDisplay');
const heartsEl   = [document.getElementById('h0'), document.getElementById('h1'), document.getElementById('h2')];
const swatchEl   = document.getElementById('colorSwatch');
const nameEl     = document.getElementById('targetName');
const overlay    = document.getElementById('overlay');
const finalScoreEl = document.getElementById('finalScore');
const overlayMsg = document.getElementById('overlayMsg');
const playBtn    = document.getElementById('playBtn');
const toastEl    = document.getElementById('toast');
const comboEl    = document.getElementById('combo');

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Init / reset ──
function initGame() {
  score  = 0;
  mistakes = 0;
  combo  = 0;
  cards  = [];
  particles = [];
  roadOffset = 0;

  car = { lane: 1, x: 0, y: 0, w: 0, h: 0, wobble: 0 };

  target = rand(COLORS);
  updateTargetUI();
  updateHUD();

  spawnCard();
  gameRunning = true;

  overlay.style.display = 'none';
  cancelAnimationFrame(animId);
  loop();
}

function updateTargetUI() {
  swatchEl.style.background = target.hex;
  nameEl.textContent = target.name;
  nameEl.style.color = target.hex;
  swatchEl.classList.remove('pulse');
  void swatchEl.offsetWidth;
  swatchEl.classList.add('pulse');
}

function updateHUD() {
  scoreEl.textContent = score;
  heartsEl.forEach((h, i) => {
    h.classList.toggle('lost', i >= (3 - mistakes));
  });
}

// ── Card spawning ──
const CARD_INTERVAL = 90; // frames between auto-spawns (if needed)
let framesSinceSpawn = 0;

function spawnCard() {
  const lane = Math.floor(Math.random() * 3);
  const color = rand(COLORS);
  cards.push({ lane, color, y: -60, speed: 4 + score * 0.18 });
  framesSinceSpawn = 0;
}

// ── Particles ──
function spawnParticles(x, y, color, count = 16) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * .5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: .035 + Math.random() * .02,
      r: 4 + Math.random() * 4,
      color,
    });
  }
}

// ── Main loop ──
function loop() {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);

  const W = canvas.width;
  const H = canvas.height;
  const laneW = W / 3;
  const carW = laneW * .45;
  const carH = carW * 1.5;
  car.w = carW; car.h = carH;
  car.x = car.lane * laneW + laneW / 2;
  car.y = H - carH - 24;

  // ── Draw background / road ──
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // road surface
  ctx.fillStyle = '#232338';
  ctx.fillRect(0, 0, W, H);

  // scrolling road stripes
  roadOffset = (roadOffset + 6) % 80;
  ctx.strokeStyle = '#ffffff18';
  ctx.lineWidth = 3;
  ctx.setLineDash([40, 40]);
  ctx.lineDashOffset = -roadOffset;
  for (let l = 1; l < 3; l++) {
    ctx.beginPath();
    ctx.moveTo(l * laneW, 0);
    ctx.lineTo(l * laneW, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // edge lines
  ctx.strokeStyle = '#ffffff30';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W, H); ctx.stroke();

  // ── Spawn logic ──
  framesSinceSpawn++;
  if (cards.length === 0 || (cards.length < 2 && framesSinceSpawn > 55)) {
    spawnCard();
  }

  // ── Cards ──
  cards.forEach(card => {
    card.y += card.speed;
    const cx = card.lane * laneW + laneW / 2;
    const cw = laneW * .55;
    const ch = cw;

    // shadow
    ctx.fillStyle = '#00000040';
    ctx.beginPath();
    ctx.roundRect(cx - cw/2 + 4, card.y + 4, cw, ch, 12);
    ctx.fill();

    // card body
    ctx.fillStyle = card.color.hex;
    ctx.beginPath();
    ctx.roundRect(cx - cw/2, card.y, cw, ch, 12);
    ctx.fill();

    // shine
    const grad = ctx.createLinearGradient(cx - cw/2, card.y, cx, card.y + ch/2);
    grad.addColorStop(0, '#ffffff30');
    grad.addColorStop(1, '#ffffff00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(cx - cw/2, card.y, cw, ch, 12);
    ctx.fill();
  });

  // ── Car (cute top-down cartoon) ──
  const carX = car.x;
  const carY = car.y;

  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
  }

  const bw = carW;       // body width
  const bh = carH;       // body height
  const bx = carX - bw/2;
  const by = carY;

  // shadow
  ctx.fillStyle = '#00000050';
  ctx.beginPath();
  ctx.ellipse(carX, by + bh/2 + 6, bw * .45, bh * .18, 0, 0, Math.PI * 2);
  ctx.fill();

  // wheels (drawn first, behind body)
  const ww = bw * .22, wh = bh * .22, wr = 4;
  ctx.fillStyle = '#1a1a1a';
  // front-left
  rr(bx - ww + 3, by + bh * .08, ww, wh, wr); ctx.fill();
  // front-right
  rr(bx + bw - 3, by + bh * .08, ww, wh, wr); ctx.fill();
  // rear-left
  rr(bx - ww + 3, by + bh * .70, ww, wh, wr); ctx.fill();
  // rear-right
  rr(bx + bw - 3, by + bh * .70, ww, wh, wr); ctx.fill();

  // wheel shine
  ctx.fillStyle = '#444';
  rr(bx - ww + 5, by + bh * .09, ww - 4, wh - 4, 3); ctx.fill();
  rr(bx + bw - 1, by + bh * .09, ww - 4, wh - 4, 3); ctx.fill();
  rr(bx - ww + 5, by + bh * .71, ww - 4, wh - 4, 3); ctx.fill();
  rr(bx + bw - 1, by + bh * .71, ww - 4, wh - 4, 3); ctx.fill();

  // body
  ctx.fillStyle = '#FF3B30';
  rr(bx, by, bw, bh, 14); ctx.fill();

  // body side stripes
  ctx.fillStyle = '#CC1A10';
  ctx.fillRect(bx, by + bh * .42, bw, bh * .16);
  rr(bx, by, bw, bh, 14);
  ctx.clip(); // clip stripes inside body shape
  ctx.fillStyle = '#CC1A10';
  ctx.fillRect(bx, by + bh * .42, bw, bh * .16);
  ctx.restore(); ctx.save();

  // windshield (front, top area)
  ctx.fillStyle = '#A8D8FF';
  ctx.globalAlpha = 0.85;
  rr(bx + bw * .12, by + bh * .07, bw * .76, bh * .26, 8); ctx.fill();
  ctx.globalAlpha = 1;

  // windshield shine
  ctx.fillStyle = '#ffffff55';
  ctx.beginPath();
  ctx.ellipse(bx + bw * .3, by + bh * .14, bw * .14, bh * .07, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // rear window (bottom area)
  ctx.fillStyle = '#A8D8FF';
  ctx.globalAlpha = 0.6;
  rr(bx + bw * .16, by + bh * .68, bw * .68, bh * .20, 7); ctx.fill();
  ctx.globalAlpha = 1;

  // roof center panel
  ctx.fillStyle = '#BB1A10';
  ctx.globalAlpha = 0.55;
  rr(bx + bw * .14, by + bh * .34, bw * .72, bh * .32, 6); ctx.fill();
  ctx.globalAlpha = 1;

  // headlights (two glowing dots at front)
  ctx.fillStyle = '#FFFAAA';
  ctx.shadowColor = '#FFEE88';
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(bx + bw * .22, by + bh * .10, bw * .09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw * .78, by + bh * .10, bw * .09, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // tail lights (red glow at rear)
  ctx.fillStyle = '#FF2200';
  ctx.shadowColor = '#FF2200';
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(bx + bw * .22, by + bh * .90, bw * .08, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + bw * .78, by + bh * .90, bw * .08, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // cute face — eyes
  // left eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw * .30, by + bh * .20, bw * .13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1aee';
  ctx.beginPath(); ctx.arc(bx + bw * .30, by + bh * .21, bw * .08, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(bx + bw * .30, by + bh * .21, bw * .045, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw * .27, by + bh * .185, bw * .025, 0, Math.PI * 2); ctx.fill();

  // right eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw * .70, by + bh * .20, bw * .13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1aee';
  ctx.beginPath(); ctx.arc(bx + bw * .70, by + bh * .21, bw * .08, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(bx + bw * .70, by + bh * .21, bw * .045, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(bx + bw * .67, by + bh * .185, bw * .025, 0, Math.PI * 2); ctx.fill();

  // smile
  ctx.strokeStyle = '#CC1A10';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(carX, by + bh * .285, bw * .18, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // blush cheeks
  ctx.fillStyle = '#FF8888';
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.ellipse(bx + bw * .18, by + bh * .275, bw * .10, bh * .04, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + bw * .82, by + bh * .275, bw * .10, bh * .04, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // ── Collision check ──
  cards = cards.filter(card => {
    const cx = card.lane * laneW + laneW / 2;
    const cw = laneW * .55;
    const ch = cw;

    // miss (fell off screen)
    if (card.y > H + 10) {
      if (card.color.id === target.id) {
        // missed correct card
        mistakes++;
        updateHUD();
        combo = 0;
        updateCombo();
        showToast('💨', card.lane * laneW + laneW/2, H * .4);
        checkGameOver();
        nextTarget();
      }
      return false;
    }

    // collision with car
    if (card.lane === car.lane) {
      const cardBottom = card.y + ch;
      const cardTop    = card.y;
      const carTop     = carY;
      const carBottom  = carY + carH;

      if (cardBottom >= carTop && cardTop <= carBottom) {
        const hitX = cx;
        const hitY = card.y + ch/2;

        if (card.color.id === target.id) {
          // ✅ correct!
          combo++;
          score += combo > 2 ? 2 : 1;
          updateHUD();
          updateCombo();
          spawnParticles(hitX, hitY, card.color.hex, 20);
          showToast('✓', hitX, hitY);
        } else {
          // ❌ wrong
          mistakes++;
          combo = 0;
          updateHUD();
          updateCombo();
          spawnParticles(hitX, hitY, '#FF3B30', 12);
          showToast('✗', hitX, hitY);
          checkGameOver();
        }
        nextTarget();
        return false;
      }
    }
    return true;
  });

  // ── Particles ──
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += .15;
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  // ── Win condition ──
  if (score >= 15) {
    endGame(true);
  }
}

function nextTarget() {
  target = rand(COLORS);
  updateTargetUI();
}

function checkGameOver() {
  if (mistakes >= 3) {
    endGame(false);
  }
}

function endGame(win) {
  gameRunning = false;
  overlay.style.display = 'flex';
  finalScoreEl.style.display = 'block';
  finalScoreEl.textContent = score;
  overlayMsg.textContent = win ? '🎉 完美通關！' : `闖關失敗，加油！`;
  playBtn.textContent = '再玩一次';
}

// ── Toast feedback ──
let toastTimeout;
function showToast(text, x, y) {
  clearTimeout(toastTimeout);
  toastEl.textContent = text;
  toastEl.style.left = x + 'px';
  toastEl.style.top  = y + 'px';
  toastEl.style.transform = 'translate(-50%,-50%) scale(.8)';
  toastEl.classList.remove('show');
  void toastEl.offsetWidth;
  toastEl.classList.add('show');
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 600);
}

// ── Combo display ──
function updateCombo() {
  if (combo >= 2) {
    comboEl.textContent = `🔥 x${combo} 連擊`;
    comboEl.classList.add('visible');
  } else {
    comboEl.classList.remove('visible');
  }
}

// ── Input: touch swipe / tap ──
let touchStartX = 0, touchStartY = 0;
let isDragging = false;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = false;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning) return;
  isDragging = true;
  const dx = e.touches[0].clientX - touchStartX;
  if (Math.abs(dx) > 20) {
    if (dx > 0 && car.lane < 2) { car.lane++; touchStartX = e.touches[0].clientX; }
    if (dx < 0 && car.lane > 0) { car.lane--; touchStartX = e.touches[0].clientX; }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameRunning || isDragging) return;
  // tap to lane
  const rect = canvas.getBoundingClientRect();
  const tx = e.changedTouches[0].clientX - rect.left;
  const laneW = canvas.width / 3;
  car.lane = Math.min(2, Math.floor(tx / laneW));
}, { passive: false });

// ── Keyboard fallback ──
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft'  && car.lane > 0) car.lane--;
  if (e.key === 'ArrowRight' && car.lane < 2) car.lane++;
});

// ── Start button ──
playBtn.addEventListener('click', initGame);

// ── Polyfill roundRect for older browsers ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = typeof r === 'number' ? [r,r,r,r] : r;
    this.moveTo(x + rad[0], y);
    this.lineTo(x + w - rad[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad[1]);
    this.lineTo(x + w, y + h - rad[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - rad[2], y + h);
    this.lineTo(x + rad[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad[3]);
    this.lineTo(x, y + rad[0]);
    this.quadraticCurveTo(x, y, x + rad[0], y);
    this.closePath();
    return this;
  };
}
</script>
</body>
